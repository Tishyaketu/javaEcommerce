spring.application.name=notification-service
server.port=8084

eureka.client.serviceUrl.defaultZone=http://eureka:password@discovery-server:8761/eureka

# Kafka Properties
spring.kafka.bootstrap-servers=kafka:29092
spring.kafka.consumer.group-id=notificationId
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.type.mapping=com.programming.techie.orderservice.event.OrderPlacedEvent:com.programming.techie.notificationservice.OrderPlacedEvent
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=com.programming.techie.notificationservice.OrderPlacedEvent

management.tracing.sampling.probability=1.0
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
